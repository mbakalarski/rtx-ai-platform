apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kps
  namespace: monitoring
spec:
  interval: 10m
  install:
    createNamespace: true
  chart:
    spec:
      chart: kube-prometheus-stack
      version: ">=83.0.0 <90.0.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: kps-values

