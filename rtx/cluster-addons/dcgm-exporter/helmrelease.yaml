apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dcgm-exporter
  namespace: monitoring
spec:
  interval: 10m
  install:
    createNamespace: true
  chart:
    spec:
      chart: dcgm-exporter
      version: "4.8.1"
      sourceRef:
        kind: HelmRepository
        name: nvidia-dcgm-exporter
        namespace: flux-system
  values:
    serviceMonitor:
      apiVersion: "monitoring.coreos.com/v1"
      enabled: true
      honorLabels: true
      additionalLabels:
        release: kps   # must match Prometheus HelmRelease (label release=kps)
