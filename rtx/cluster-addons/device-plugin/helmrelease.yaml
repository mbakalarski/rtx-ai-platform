apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nvidia-device-plugin
  namespace: gpu-system
spec:
  interval: 10m
  install:
    createNamespace: true
  chart:
    spec:
      chart: nvidia-device-plugin
      version: "0.19.0"
      sourceRef:
        kind: HelmRepository
        name: nvdp
        namespace: flux-system
  values:
    gfd:
      enabled: true
    deviceDiscoveryStrategy: nvml
